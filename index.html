
<!doctype html>
<html lang="en">
    <head>
        <title>Gas Watch by TWMM</title>

        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
        

        <style id="General">

            /* ----- General ----- */

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                height: auto;
                font-family: 'Satoshi', sans-serif;
                transition: all 0.3s ease;
            }

            section {
                z-index: 200;
                margin: clamp(2px, 0.5dvw, 5px);
                padding: clamp(2px, 0.5dvw, 5px);
                width: 100%;
                border-radius: 4px;
                box-shadow: 0 0 10px rgba(242, 242, 246, 0.2);
            }            
            
            section:hover {
                box-shadow: 0 0 10px rgba(242, 242, 246, 0.3);
            }

            div {
                margin: 1px;
                padding: 2px;
                border-radius: 2px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.03);
            }

            /* For Specific Use-Case

            div:hover {
                background: linear-gradient(180deg, #ffffff 0%, #d1d1d1 100%);
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.06);
            }

            */


            /* -- Text -- */

            h1 {
                font-weight: 800;
                font-size: clamp(1rem, 0.75rem + 1.5dvw, 1.5rem);
                text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.09);
            }

            h2 {
                font-weight: 750;
                font-size: clamp(.75rem, 0.5rem + 1.28dvw, 1.25rem);
                text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.07);
            }

            h3, h4 {
                font-weight: 625;
                font-size: clamp(0.625rem, 0.375rem + 1.06dvw, .9rem);
                text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.05);
            }

            button  {
                font-size: clamp(0.57rem, 0.5rem + .7dvw, 0.85rem);
                text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.03);
            }
            
            h5, p, 
            span, details, a, strong, 
            input, textarea, select, option  {
                font-size: clamp(0.55rem, 0.3rem + .7dvw, 0.75rem);
                text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.03);
            }


            strong {
                font-weight: 600;
            }


            .lesserP, h6 {
                font-size: clamp(0.45rem, 0.3rem + 0.7dvw, 0.5rem);
            }

            .fineP {
                font-size: clamp(0.375rem, 0.25rem + 0.6dvw, 0.45rem);
            }


            /* -- Special -- */

            /*Inputs(Textrea)/Selects*/

            input, select, textarea {
                outline: none;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }

            input:hover, select:hover, textarea:hover {
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.12);
            }

            input:focus, select:focus, textarea:focus {
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }

            input {
                padding-left: 2.5px;
            }

            textarea {
                padding: 2px;
            }

            select {
                padding: 4px;
            }


            a{
                text-decoration: none;
                color: inherit;
            }


            .userInput {
                width: 100%;
                border-radius: 2px 0px 0px 2px;
                min-height: 18px;
                height: calc(17px + 0.35vw);
                max-height: 20px;
            }


            /*Images*/

            .imgContainer {
                box-shadow: 0 0 0 rgba(0, 0, 0, 0.15);
                object-fit: contain;
            }

            img {
                width: 100%;
                height: 100%;
            }


            /*Hr*/

            hr {
                width: 96%;
                height: 1.5px;
                margin: 0 auto;
                border: none;
            }

            .vertHr {
                width: 1.5px;
                height: 96%;
            }


            /* -- Buttons -- */

            button {
                cursor: pointer;
                display: flex;
                justify-content: center;
                align-items: center;
                width: auto;
                min-height: 22px;
                height: 2.9dvw;
                max-height: 32px;
                perspective: 5px;
                border-radius: 2.5px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }

            button:hover {
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.15);
            }

            button:focus, button.active {
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.12);
            }
            

            .fullButton {
                width: 100%;
            }

            .widthButton {
                min-width: 66px;
                width: 12dvw;
                max-width: 100px;
            }

            .smallButton {
                min-height: 18px;
                height: calc(17px + 0.35vw);
                max-height: 20px;
                width: auto;
                padding: 0 5px;
            }

            .sendButton {
                border-radius: 0 2px 2px 0;
            }


            /*--Icons--*/
            

            i, .IconAs, .IconA, .IconB, 
            .IconCs, .IconC, .IconD {
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 2px;
            }

            /*A(Clear/Large)*/
            .IconAs {
                background: transparent;
                border: none;
                box-shadow: none;
                gap: calc(.1rem + .2dvw);
            }

            .IconA {
                min-width: 24px;
                width: calc(20px + .6dvw);
                max-width: 28px;
                min-height: 24px;
                height: calc(20px + .6dvw);
                max-height: 28px;
                font-size: clamp(0.8rem, 0.4rem + .5dvw, 1rem);
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.04);
            }

            .IconA:hover {
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.07);
            }

            .IconA:focus {
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.06);
            }


            /*B(Color/Large)*/
            .IconB {
                min-width: 24px;
                width: calc(20px + .6dvw);
                max-width: 28px;
                min-height: 24px;
                height: calc(20px + .6dvw);
                max-height: 28px;
                font-size: clamp(0.7rem, 0.4rem + .5dvw, 1rem);
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }

            .IconB:hover {
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.15);
            }

            .IconB:focus {
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.12);
            }

            /*C(Clear/Small)*/

            .IconCs {
                background: transparent;
                border: none;
                box-shadow: none;
                margin: 0;
                padding-right: 2px;
            }

            .IconC {
                min-width: 16px;
                width: calc(12px + .6dvw);
                max-width: 20px;
                min-height: 16px;
                height: calc(12px + .6dvw);
                max-height: 20px;
                line-height: 16px;
                font-size: clamp(0.62rem, 0.6rem + .55dvw, .8rem);
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.02);
            }
                        
            .IconC:hover, .IconC.active:hover {
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
            }

            .IconC.active {
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.04);
            }

            
            /*D(Color/Small)*/
            .IconD {
                min-width: 16px;
                width: calc(12px + .6dvw);
                max-width: 20px;
                min-height: 16px;
                height: calc(12px + .6dvw);
                max-height: 20px;
                line-height: 16px;
                font-size: clamp(0.62rem, 0.6rem + .55dvw, .8rem);
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }

            .IconD:hover {
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.15);
            }

            .IconD:focus {
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.12);
            }

            /*DisplayIcon(Transparent/Fine)*/

            .displayIcons, .displayIcon {
                display: flex;
                justify-content: center;
                align-items: center;
                background: transparent;
                border: none;
                box-shadow: none;
                margin: 0;
                padding: 0;
            }
            
            .displayIcon {
                font-size: clamp(0.45rem, 0.3rem + 0.7dvw, 0.55rem);
            }


            /*Int Icons*/

            .intIconsBottom {
                justify-content: space-between;
                width: 100%;
                opacity: .45;
            }

            .intsBottom:hover {
                opacity: .9;
            }

            .intIconsLeft {
                margin-right: auto;
            }

            .intIconsRight {
                margin-left: auto;
            }


            
            /*FA Types*/


            .tabToggle, .cloudHelpSection {
                background: transparent;
                border: none;
                box-shadow: none;
                margin: 0;
                padding: 0;
            }
                        
            .tabToggle, .navArrow, .cloudHelpSection {
                display: flex;
                justify-content: center;
                align-items: center;
            }
  
            .fa-grip-horizontal {
                cursor: grab;
            }


            
            /*searchIcon*/
            
            .searchIcon {
                border-radius: 0 2px 2px 0;
                min-height: 18px;
                height: calc(17px + 0.35vw);
                max-height: 20px;
            }


            /*exitButton*/

            .exitButton {
                align-self: flex-start;
            }



            /*tab/contToggle*/
            
            .tabToggle {
                flex-direction: column;
                margin: 0;
                gap: .2px;
            }

            .tabToggle i {
                font-size: clamp(0.65rem, 0.15rem + 1vw, 0.8rem);
            }

            .tabToggle > :first-child {
                margin-bottom: -5px;
            }

            .tabToggle > :nth-child(2) {
                margin-bottom: -2px;
            }


            .contSizeToggle {
                margin: auto;
                gap: 0px;
                padding: 1px 0;
                position: absolute; /* or fixed */
                touch-action: none; /* REQUIRED: stops browser from scrolling/panning */
                user-select: none;  /* stops text highlighting while dragging */
                -webkit-user-select: none;
                overflow: hidden;   /* keeps content tidy during resize */
            }


            /*navArrows*/

            .navArrow {
                margin: auto 0;
                height: 100%;
                width: 6%;
                opacity: .11;
                cursor: pointer;
            }

            .navArrow:hover {
                opacity: 0.22;
            }

            .prevArrow {
                left: 0;
                border: none;
                border-radius: 0 10px 10px 0;
            }

            .nextArrow {
                right: 0;
                border: none;
                border-radius: 10px 0 0 10px;
            }

            .navArrow i {
                transform: scale(0.8, 2.5);
            }


            /* -- CloudHelp -- */

            .cloud, .cloudHelpSection {
                position: absolute;
                text-shadow: none;
            }

            .cloudHelpSection {
                flex-direction: column;
                text-align: center;
            }


            .cloud {
                z-index: 820;
                opacity: 0;
                transition: opacity .9s ease-in-out;
            }
            
            .visible {
                opacity: 1 !important;
            }


            #cloud1 {
                width: calc(1rem + 1dvw);
                height: calc(1rem + 1dvw);
                font-size: calc(1rem + 1dvw);
                top: calc(0.1rem + 1dvw);
                right: calc(3rem + 3dvw);
                transform: rotate(45deg);
            }

            #cloud2 {
                width: calc(1.5rem + 1.5dvw);
                height: calc(1.5rem + 1.5dvw);
                font-size: calc(1.5rem + 1.5dvw);
                top: calc(1rem + 2dvw);
                right: calc(4rem + 4.5dvw);
                transform: rotate(210deg);
            }

            #cloud3 {
                font-size: calc(10rem + 10dvw);
                width: calc(10rem + 10dvw);
                height: calc(10rem + 10dvw);
                top: -8px;
                right: calc(7rem + 7dvw);
                text-shadow: 2px 2px 2px rgba(0, 0, 0, .1);
            }


            .cloudHelpSection {
                z-index: 825;
                top: calc(1.5rem + 1.5dvw);
                right: calc(6.75rem + 6.75dvw);
            }

            .cloudHelpSection h5 {
                margin-top: calc(1rem + 1dvw);
            }

            .cloudHelpHShadow {
                width: 90%;
                margin: 2px 0 6px 0;
            }


            .cloudHelpNav {
                width: calc(8rem + 8dvw);
                height: calc(4.5rem + 4.5dvw);
                overflow-x: hidden;
                overflow-y: auto;
            }


            /* gearSpin div */

            .gearSpin {
                margin: 0;
                padding: 0;
            }

        </style>

        <style id="Standard">

            /* ----- Standard ----- */

            /* -- General Page -- */

            .container {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                width: 100%;
                height: 100%;
                margin: 0;
            }

            .Nav, .Head, .Tail {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .Nav {
                background: transparent;
            }

            .Head {
                flex-direction: column;
            }

            .Body {
                flex-grow: 1;
                width: 100%;
            }

            .Tail {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 5px 10px;
                bottom: 0;
            }

            .part {
                width: 100%;
            }

            .page {
                width: 100%;
                height: 100%;
                background: transparent;
                border: none;
                box-shadow: none;
                margin: 0;
                padding: 0;
            }

                
            #Home {
                flex: 1;
                background: transparent;
                border: none;
                box-shadow: none;
                margin: -2px 0 0 -2px;
                padding: 0;
                width: 100%;
                height: auto;
                align-self: flex-start;
                justify-self: flex-start;
            }



            /* -- setionHead -- */

            .sectionHead {
                cursor: pointer;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 0 auto;
                min-width: 120px;
                width: 30dvw;
                height: 30px;
                margin-right: 2.5px;
            }


            .sectionHeadH2 {
                width: 100%;
                margin: 0;
                padding: 0;
                text-align: center;
            }
            
            .headPopUp {
                z-index: 820;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: space-evenly;
                text-align: center;
                position: absolute;
                opacity: .98;
                min-width: 120px;
                width: 30dvw;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
            }

            .headPopUp:hover {
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }



            .headPopUpH2 {
                cursor: pointer;
                padding: 8px 4.5px;
                width: 100%;
            }
            

            .search {
                flex: 1;
                display: flex;
                justify-content: flex-end;
                align-items: center;
            }

            
            .navTabs {                
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 5px;
            }

            .navTab {
                flex-basis: calc(33% - 5px);
            }



            /* -- Logo -- */

            .logoTitleCont, .logo, .logoPic,
            .logoTitle, .logoTitleBox,
            .loadingScreen {
                background: transparent;
                border: none;
                box-shadow: none;
                margin: 0;
                padding: 0;
            }
                
            .logoTitleCont, .logo, .logoPic, .logoTitleBox,
            .logoTitle, .loadingScreen {
                display: flex;
                justify-content: center;
                align-items: center;
            }


            /*Logo Container*/ 

            .logoTitleCont {
                gap: calc(0.4dvw + 2.4px);
            }

            .logoTitleContN {
                margin: 0 4px;
                padding-left: 5px;
                height: 44px;
                min-width: 96px;
                width: calc(90px + 5dvw);
                max-width: 140px;
                border-radius: 2px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.03);
            }


            /*Logos*/

            .logo {
                min-width: 21px;
                width: calc(.8rem + 1.2dvw);
                max-width: 26px;
                min-height: 21px;
                height: calc(.8rem + 1.2dvw);
                max-height: 26px;
                border-radius: 50%;
            }

            
            /*Logoitle*/

            .logoTitleBox {
                flex-direction: column;
            }

            .logoTitle {
                justify-content: flex-start;
                width: auto;
                min-height: 13px;
                height: calc(.78rem + 1dvw);
                max-height: 26px;
            }

            .logoTitleBox hr {
                height: 1.2px;
                width: 60%;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.08);
            }


            /*Loading Logo*/

            #loadScreen1 {
                flex-direction: column;
                width: 100%;
                height: 100dvh;
                margin-top: -5%;
                font-size: 32px;
                transition: display 1s ease;
            }

            .loadingLogo {
                min-width: 32px;
                width: 32px;
                max-width: 32px;
                min-height: 32px;
                max-height: 32px;
                height: 32px;
                margin-right: 5px;
            }


            .loadLogoTitle {
                min-height: 36px;
                height: 36px;
                max-height: 36px;
            }
            
                        
            /* The spinning wheel style */
            .loader {
                border: 4px solid #f3f3f3;
                border-top: 4px solid #3498db;
                border-radius: 50%;
                width: 36px;
                height: 36px;
                animation: spin 1s linear infinite;
                margin: 13px auto;
            }

            /* The rotation animation */
            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }



            /* -- Nav Links -- */

            
            /*navLinks*/

            .navExitCont {
                display: flex;
                justify-content: flex-end;
                align-items: center;
                justify-self: flex-end;
                align-self: flex-end;
                margin-left: auto;
                padding: 5px 5px 2.5px 6px;
                border-radius: 2.5px;
                margin-bottom: 2.5px;
                gap: clamp(4px, 0.2rem + 1.5dvw, 60px);
            }

            .navLinksBox, .navLinks {
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
                align-items: center;
                background: transparent;
                box-shadow: none;
                border: none;
            }
            
            .navLinks {
                flex-direction: row;
                gap: calc(0.01rem + 0.12dvw);
            }

            .navLink {
                border-radius: 3px 3px 1px 1px;
                min-width: 42px;
                width: 10dvw;
                max-width: 200px;
                margin: 0;
                box-shadow: none;
            }


            /*NavLinks Hr's*/
            .navLinksHr {
                width: 1px;
                height: 30px;
                align-self: flex-end;
                margin-bottom: 2px;
            }

            .navLinksBoxShadows {
                display: flex;
                justify-content: space-evenly;
                margin: 1px 0 0 0;
                padding: 0.5px 0 0 0;
                flex: 1;
                width: 100%;
                height: auto;
                border-radius: 0 0 1px 1px;
                border-left: none;
                border-right: none;
            }

            .navLinksShadows {
                display: flex;
                justify-content: center;
                align-items: center;
                margin-bottom: -6px;
                padding: 0;
                flex: 1;
                width: 100%;
                height: auto;
                border-radius: 0;
                border-radius: 2px 2px 0.1px 0.1px;
            }
                        
            .navLinksHr {
                height: 16px;
                width: 1px;
                box-shadow: none;
                margin: 0;
            }


            /* -- SubNav -- */

            .headNav, .subNavMore, .subNavMoreBox {
                background: transparent;
                border: none;
                box-shadow: none;
                margin: 0;
                padding: 0;
            }

            .headNav {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .subNav {
                position: absolute;
                width: 32%;
                height: auto;
                gap: 1px;
            }

            .subNavRow, .subNavRow2 {
                display: flex;
                justify-content: space-between;
                align-items: center;
                cursor: pointer;
                padding: 4px;
            }

            .subNavRow2 {
                margin-left: 10px;
            }

            .subNavMore {
                display: flex;
                justify-content: flex-end;
                align-items: stretch;
                gap: 1px;
            }

            .subNavHr {
                width: 1.5px;
                height: auto;
                margin: 1px 0 3px 8px;
            }

            .subNavMoreBox {
                flex: 1;
                margin: 0 0 0 -3px;
                padding-left: 0;
            }

            /*subNavButtons*/

            .subNavButton {
                line-height: 1;
                cursor: pointer;
            }

            .subPlusButton {
                font-weight: 600;
                margin-right: 4px;
            }

            .subMoreToggle {
                transform: rotate(-90deg);
                margin-right: 1px;
            }


            /* -- DisplayBox -- */

            .displayReports, #displayReportHelp, .displayBox {
                background: transparent;
                border: none;
                box-shadow: none;
                margin: 0;
                padding: 0;
            }

            .display-pollName, .displayedDirections {
                margin: 0;
            }

            .displayHead {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding-left: 12px;
            }

            .display-pollName {
                margin-left: 2px;
            }

            /*displayReport*/

            .displayReports {
                position: absolute;
                align-self: flex-start;
                justify-self: flex-end;
                display: flex;
                justify-content: flex-end;
                align-items: flex-start;
            }

            .displayReport {
                flex-direction: column;
                width: calc(5rem + 20dvw);
            }

            #flagReportReason {
                border-radius: 2px 2px 0.5px 0.5px;
            }

            .flagReportInput {
                min-height: 50px;
                max-height: 100px;
                border-radius: 0.5px 0.5px 0.5px 0.5px;
            }

            .displayReportSubmit {
                border-radius: 0.5px 0.5px 2px 2px;
            }

            /*PollDisplay*/

            .pollCreation, .displayBody, .pollDisplayBody,
            .pollDisplayBox {
                background: transparent;
                border: none;
                box-shadow: none;
                margin: 0;
                padding: 0;
            }


            .pollDisplay {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: space-between;
                height: 430px;
                width: 100%;
            }

            .pollTitle {
                display: flex;
                justify-content: flex-start;
                align-items: center;
                padding: 2px 10px;
                width: 100%;
                height: 38px;
            }

            .displayedDirections {
                width: 100%;
            }

            .pollCreation {
                width: 30%;
                display: flex;

            const navBars = document.querySelectorAll('.fa-bars');

            navBars.forEach(navBar => {

                //navBar Dataset (Section, Sub)
                const dataSection = document.getElementById(navBar.getAttribute('data-section'));
                const subNav = document.getElementById(navBar.getAttribute('data-sub'));
                                        
                navBar.addEventListener('click', () => {

                    if (subNav.style.display === 'none') {
                        subNav.style.display = 'block';
                    } else {
                        subNav.style.display = 'none';
                    }


                    function blurSubNav(event) {
                        
                        //If Not Bars or subNav OR toggle: Display None
                        if (!navBar.contains(event.target) && !subNav.contains(event.target)
                            && !dataSection.querySelector('.tabToggles').contains(event.target)
                           ) {

                            //subNav
                            subNav.style.display = 'none';
                            
                            //subMore
                            const subMoreBoxes = document.querySelectorAll('.subNavMore');                
                            const subMoreToggles = document.querySelectorAll('.subMoreToggle');

                            //Display None More Box, Turn More Icon
                            subMoreBoxes.forEach(box => {box.style.display = 'none'});
                            subMoreToggles.forEach(t => {t.style.transform = 'rotate(-90deg)'});

                            document.addEventListener('click', blur);

                            return;
                        }

                        return;
                    }

                    document.addEventListener('click', blurSubNav);
                });
            });

            //SubNav

            const subNavRow = document.querySelectorAll('.subNavRow');

            subNavRow.forEach(row => {

                //subNav Dataset (Target, Slug)
                const subMoreBox = document.querySelector(row.getAttribute('data-target'));
                const subMoreToggle = document.querySelector(row.getAttribute('data-slug'));

                row.addEventListener('click', () => {

                    //Display More Row & Turn More Icon
                    if (subMoreBox.style.display === 'none') {
                        subMoreBox.style.display = 'flex';
                        subMoreToggle.style.transform = 'rotate(0deg)';

                    } else {
                        subMoreBox.style.display = 'none';
                        subMoreToggle.style.transform = 'rotate(-90deg)';
                    }
                });
            });

            
            // Tab Toggles
            const tabToggles = document.querySelectorAll('.tabToggles');

            tabToggles.forEach(icon => {
                icon.addEventListener('click', () => {

                    // Declarations
                    const dataSection = document.getElementById(icon.getAttribute('data-section'));

                    const tabMinus = dataSection.querySelector(`.tabMinus`);
                    const tabPlus = dataSection.querySelector(`.tabPlus`);

                    const relTabsBox = dataSection.querySelector(`.navTabs`);
                    const relSubNav = dataSection.querySelector(`.subNav`);
                    const relDisplayReports = dataSection.querySelectorAll('.displayReport');


                    // If Display Flex
                    if (relTabsBox.style.display === 'flex') {
                        
                        tabMinus.style.display = 'none';
                        tabPlus.style.display = 'flex';
                        relTabsBox.style.display = 'none';

                        // Updates: SubNav/DisplayReport Tops, Chat Height
                        relSubNav.style.top = '107.5px';
                        relDisplayReports.forEach(d => {d.style.top = '149px';});

                    // Else
                    } else {

                        tabPlus.style.display = 'none';
                        tabMinus.style.display = 'flex';
                        relTabsBox.style.display = 'flex';

                        // Updates: SubNav/DisplayReport Tops, Chat Height
                        relSubNav.style.top = '137.5px';
                        relDisplayReports.forEach(d => {d.style.top = '185px';});

                    }

                });
            });
            

            //Container Size Toggles
            const contSizeToggles = document.querySelectorAll('.contSizeToggle');

            contSizeToggles.forEach(toggle => {

                const dataCont = toggle.getAttribute('data-cont');
                const containers = document.querySelectorAll(dataCont);

                let ExtendedDisplay = document.getElementById('Extended').style.display;
                let extNavTabsDisplay = document.getElementById('extNavTabs').style.display;

                let initialBaseHeight = containers[0].getBoundingClientRect().height;

                // 1. Declare variables out here so they "survive" the if/else
                let maxAllowedHeight;
                let minAllowedHeight;

                // 2. Wrap the OR condition in parentheses so the AND logic works correctly
                if (extNavTabsDisplay === 'flex') {
                    maxAllowedHeight = initialBaseHeight + 500;
                    minAllowedHeight = initialBaseHeight - 500;
                } else {
                    maxAllowedHeight = initialBaseHeight + 530;
                    minAllowedHeight = initialBaseHeight - 470;
                }

                // 2. This variable persists so all toggles and "pages" stay in sync
                let sharedCurrentHeight = initialBaseHeight;

                toggle.addEventListener('pointerdown', (e) => {
                    e.preventDefault();
                    const startY = e.clientY;
                    
                    // Use the height we last set, not the current element's height
                    // (which might be 0 if the element was hidden)
                    const startHeight = sharedCurrentHeight;

                    document.querySelector('.fa-grip-horizontal').style.cursor = 'grabbing';
                    toggle.style.cursor = 'grabbing';

                    document.onpointermove = (e) => {
                        const deltaY = startY - e.clientY;
                        let newHeight = startHeight + deltaY;

                        if (newHeight > maxAllowedHeight) newHeight = maxAllowedHeight;
                        if (newHeight < minAllowedHeight) newHeight = minAllowedHeight;

                        // Update the shared height tracker
                        sharedCurrentHeight = newHeight;

                        // Apply to ALL containers immediately
                        containers.forEach(c => {
                            c.style.height = `${newHeight}px`;
                        });
                        
                    };

                    document.onpointerup = () => {
                        document.onpointermove = null;
                        document.onpointerup = null;

                        document.querySelector('.fa-grip-horizontal').style.cursor = 'grab';      
                        toggle.style.cursor = 'grab';                  
                    };
                });
            });

        </script>

                const checkSlug = document.getElementById(sort.getAttribute('data-checkSlug'));

                    //Displays None & Remove Actives
                    specChatBoards.forEach(c => {c.style.display = 'none';});
                    check.style.display = 'none';
                    checkSlug.style.display = 'none';
                    specChatSorts.forEach(s => {s.classList.remove('active');});
                    //Updates (Target Grid, Add Active)
                    target.style.display = 'grid';
                    sort.classList.add('active');
                });
            });


            /* -- Full Chat -- */

            //Click Mini-Chat-Board for Full Chat
            chatBoards.forEach(board => {
                //chatBoard Dataset (sClass, target, slug)
                const sClasses = document.querySelectorAll(board.getAttribute('data-sClass'));
                const target = document.getElementById(board.getAttribute('data-target'));
                const slug = document.getElementById(board.getAttribute('data-slug'));
                board.addEventListener('click', () => {
                    //Return if on Target Full Chat
                    if (board.id === target.id) {
                        return
                    } else {
                        //Find Current Chat Boards & Display None
                        sClasses.forEach(c => {c.style.display = 'none';});
                        //Target Full Chat and Body Display Grid
                        target.style.display = 'grid';
                        slug.style.display = 'grid';
                    }
                });
            });

            //Exit Full Chat    
            const exitFChats = document.querySelectorAll('.exitFChat');

            exitFChats.forEach(exit => {
                //exitFChat Dataset (target, slug, revert)                
                const target = document.getElementById(exit.getAttribute('data-target'));                
                const slug = document.getElementById(exit.getAttribute('data-slug'));                
                const revert = document.querySelector(exit.getAttribute('data-revert'));
                const revertTarget = document.getElementById(revert.getAttribute('data-target'));

                exit.addEventListener('click', () => {
                    //Display None & Add Active
                    target.style.display = 'none';
                    slug.style.display = 'none';
                    //Find Active Board and Display Grid
                    revertTarget.style.display = 'grid';
                });
            });
            

        </script>

        <script>

            var isSearching = false;

            // 1. Initialize map container with fallback view (Denver)
            var map = L.map('map').setView([39.7392, -104.9903], 13);
            var markers = []; 

            L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                maxZoom: 20,
                attribution: 'Map data &copy; Google'
            }).addTo(map);

            navigator.geolocation.getCurrentPosition(
                function (position) {
                    var userLat = position.coords.latitude;
                    var userLon = position.coords.longitude;

                    // Move map to user location
                    map.setView([userLat, userLon], 13);

                    // Add starting marker at user location
                    var startingMarker = L.marker([userLat, userLon], { 
                        icon: L.divIcon({ className: 'black-marker-icon' }) 
                    }).addTo(map);

                    startingMarker.bindPopup("<b>You are here</b>").openPopup();

                    // AUTOMATIC PULL ON PAGE LOAD: Fires the scraper instantly using your physical GPS coordinates
                    getPricesNow("Current Location", userLat, userLon);
                },
                function (error) {
                    console.log("Geolocation failed or denied. Using Denver fallback.");
                    loadDenverFallback();
                }
            );

            function loadDenverFallback() {
                map.setView([39.7392, -104.9903], 13);
                var startingMarker = L.marker([39.7392, -104.9903], { 
                    icon: L.divIcon({ className: 'black-marker-icon' }) 
                }).addTo(map);

                // AUTOMATIC FALLBACK PULL: Scrapes Denver gas options automatically if geolocation fails
                getPricesNow("80204", 39.7392, -104.9903);
            }

            /* ==========================================================================
            APIFY REAL GAS PRICE ENGINE OVERLAY
            ========================================================================== */
function getPricesNow(searchQuery, targetLat, targetLon) {
    console.log("=== EXECUTING SECURE BACKEND FETCH ENGINE ===");

    var searchField = document.getElementById('searchBar');
    if (searchField) searchField.placeholder = "Scraping live gas prices (takes ~10s)...";

    // Update this to your live production server URL when you deploy online
    const BACKEND_URL = "https://gas-watch-server.onrender.com/api/gas-prices";

    // Securely request data from your private Node backend gateway
    fetch(BACKEND_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ search: searchQuery }) 
    })
    .then(response => {
        if (!response.ok) throw new Error("Network response was not ok via secure backend.");
        return response.json();
    })
    .then(datasetItems => {
        if (searchField) searchField.placeholder = "Search Extended Section Here!";
        
        if (datasetItems.error) {
            alert("Error: " + datasetItems.error);
            return;
        }

        if (!datasetItems || datasetItems.length === 0) {
            alert("No gas stations found in this area.");
            return;
        }

        // Clear previous markers safely
        for (var i = 0; i < markers.length; i++) {
            map.removeLayer(markers[i]);
        }
        markers = [];

        datasetItems.forEach((station, index) => {
            // Leaflet map placement calculation logic 
            var angle = index * (360 / datasetItems.length) * (Math.PI / 180);
            var radiusOffset = 0.08 * Math.random(); 
            
            var lat = targetLat + (Math.sin(angle) * radiusOffset);
            var lon = targetLon + (Math.cos(angle) * radiusOffset);
            
            var currentPrice = parseFloat(station.price_cash || station.price_credit || 3.49);
            var stationName = station.name || "Gas Station";
            var streetAddress = station.address_line1 || "Address Unlisted";
            var locality = station.address_locality || "";

            var priceIcon = L.divIcon({
                className: 'gas-price-marker',
                html: "$" + currentPrice.toFixed(2)
            });

            var marker = L.marker([lat, lon], { icon: priceIcon });

            marker.bindPopup(`
                <div class="custom-popup">
                    <h3>${stationName}</h3>
                    <p>${streetAddress}, ${locality}</p>
                    <div class="price-tag">Regular: $${currentPrice.toFixed(2)}</div>
                </div>
            `);

            marker.addTo(map);
            markers.push(marker);
        });

    })
    .catch(error => {
        if (searchField) searchField.placeholder = "Search Extended Section Here!";
        alert("Error fetching gas prices: " + error.message);
    });
}

function searchFunction() {
    searchLocation();
}

            function searchByZipcode(zipcode) {
                var apiUrl = "https://api.zippopotam.us/us/" + zipcode;
                fetch(apiUrl)
                    .then(response => {
                        if (!response.ok) throw new Error('Location not found');
                        return response.json();
                    })
                    .then(data => {
                        // FIXED: Uses correct string bracket properties for safety
                        var latitude = parseFloat(data.places[0]["latitude"]);
                        var longitude = parseFloat(data.places[0]["longitude"]);
                        
                        getPricesNow(zipcode, latitude, longitude);
                    })
                    .catch(error => alert(error.message));
            }

            function searchByPlaceName(placeName) {
                // FIXED: Directs request to the dedicated data sub-engine
                var nominatimUrl = "https://nominatim.openstreetmap.org/search?q=" + encodeURIComponent(placeName) + "&format=json";
                
                fetch(nominatimUrl, {
                    headers: {
                        'User-Agent': 'GasPriceMapApplication/1.0 (contact@example.com)'
                    }
                })
                    .then(response => {
                        if (!response.ok) throw new Error('Address or Place not found');
                        return response.json();
                    })
                    .then(data => {
                        if (data.length > 0) {
                            // FIXED: Target index zero array properties and parse text to real float digits
                            var latitude = parseFloat(data[0].lat);
                            var longitude = parseFloat(data[0].lon);
                            
                            // Move the map view instantly to your search location numbers
                            map.setView([latitude, longitude], 13);
                            
                            getPricesNow(placeName, latitude, longitude);
                        } else {
                            alert("Location not found.");
                        }
                    })
                    .catch(error => alert(error.message));
            }

            function searchLocation() {
                // Clear any leftover map markers before drawing new location search loops
                for (var i = 0; i < markers.length; i++) {
                    map.removeLayer(markers[i]);
                }
                markers = [];

                var combinedInput = document.getElementById('searchBar').value.trim();
                if (!combinedInput) return;

                if (/^\d{5}$/.test(combinedInput)) {
                    searchByZipcode(combinedInput);
                } else {
                    searchByPlaceName(combinedInput);
                }
            }

            document.addEventListener("DOMContentLoaded", function() {
                var bar = document.getElementById("searchBar");
                if (bar) {
                    bar.addEventListener("keypress", function(event) {
                        if (event.key === "Enter") searchLocation();
                    });
                }
                var icon = document.getElementById("extSearchIcon");
                if (icon) {
                    icon.addEventListener("click", searchLocation);
                }
            });

            // Listen for the exact second a user stops panning or zooming the map canvas
            map.on('moveend', function() {
                // If an API call is already running, skip this movement trigger
                if (isSearching) return; 
                
                // 1. Get the brand new center coordinates of where the user dragged the map
                var center = map.getCenter();
                var currentLat = center.lat;
                var currentLon = center.lng;

                isSearching = true;

                // 2. Ask Nominatim what city matches these map coordinates
                var reverseUrl = "https://nominatim.openstreetmap.org/reverse?format=json&lat=" + currentLat + "&lon=" + currentLon;
                
                fetch(reverseUrl, {
                    headers: {
                        'User-Agent': 'GasPriceMapApplication/1.0 (contact@example.com)'
                    }
                })
                .then(response => response.json())
                .then(data => {
                    // Extract the city name, neighborhood, or county name string safely
                    var placeName = data.address.city || data.address.town || data.address.village || data.address.county || "Current Location";
                    
                    console.log("Map dragged to new region:", placeName);
                    
                    // 3. Fire off your working Apify engine using the new center coordinates
                    getPricesNow(placeName, currentLat, currentLon);
                })
                .catch(error => {
                    console.log("Error reverse geocoding map position:", error.message);
                })
                .finally(() => {
                    // Unlock the switch so the next map drag can process
                    isSearching = false; 
                });
            });

        </script>
